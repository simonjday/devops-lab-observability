---
# Flux GitRepository pointing to separate observability stack repo
# Keep this repo clean & separate from main devops-lab-repo
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: devops-lab-observability
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/simonjday/devops-lab-observability.git
  ref:
    branch: main
  secretRef:
    name: flux-git-credentials

---
# Flux Kustomization for observability stack (Loki + Promtail)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: devops-lab-observability
  path: ./observability/loki
  prune: true
  wait: true
  timeout: 5m
  retryInterval: 2m
  health:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: loki
      namespace: observability

---
# Flux Kustomization for security stack (Falco)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: security
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: devops-lab-observability
  path: ./security/falco
  prune: true
  wait: true
  timeout: 5m
  retryInterval: 2m
  dependsOn:
    - name: observability
  health:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: falco
      namespace: falco
