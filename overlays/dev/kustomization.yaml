# Dev Overlay - Small resources, short retention
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../

namespace: observability

commonLabels:
  environment: dev
  tier: development
  team: platform

commonAnnotations:
  description: "Development observability stack"

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: loki
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: falco
      namespace: falco
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "200m"

replicas:
  - name: loki
    count: 1

configMapGenerator:
  - name: dev-observability-config
    behavior: create
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - RETENTION_DAYS=3
      - STORAGE_SIZE=2Gi
