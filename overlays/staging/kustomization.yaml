# Staging Overlay - Medium resources, medium retention
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../

namespace: observability

commonLabels:
  environment: staging
  tier: pre-production
  team: platform

commonAnnotations:
  description: "Staging observability stack"

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: loki
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "10Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: falco
      namespace: falco
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

replicas:
  - name: loki
    count: 1

configMapGenerator:
  - name: staging-observability-config
    behavior: create
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=info
      - RETENTION_DAYS=7
      - STORAGE_SIZE=10Gi
